# QLoRA Fine-tuning Configuration for Mistral 7B
# Uses 4-bit quantization for memory-efficient training

run_name: "mistral-7b-qlora-finetune"
method: "qlora"

# Base model configuration
base_model: "mistralai/Mistral-7B-v0.1"
model:
  trust_remote_code: false

# Dataset configuration
dataset:
  source: "/data/dataset.json"
  hub_dataset: false
  split: "train"
  max_samples: null
  eval_split: 0.1
  prompt_template: |
    <s>[INST] {instruction}

    {input} [/INST]
    {output}</s>

# Training hyperparameters (optimized for QLoRA)
training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_ratio: 0.03
  max_length: 2048
  weight_decay: 0.01

# QLoRA configuration
qlora:
  r: 64               # Higher rank for QLoRA
  alpha: 16           # Lower alpha/r ratio
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Quantization settings
quantization:
  type: "nf4"          # NormalFloat4 quantization
  double_quant: true   # Use double quantization
  compute_dtype: "bfloat16"

# Output options
save_full_model: false

# Logging
use_wandb: false
wandb_project: "tunellm-training"
